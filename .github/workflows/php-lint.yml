name: PHP Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.1'
      - name: Find PHP files and lint
        run: |
          set -e
          echo "Running php -l on .php files"
          find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./.git/*" | while read -r f; do
            php -l "$f" || exit 1
          done
