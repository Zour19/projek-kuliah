version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: florist-shop-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=sqlite
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/app
      - ./storage/logs:/app/storage/logs
    depends_on:
      - db
    networks:
      - florist

  db:
    image: sqlite:latest
    container_name: florist-shop-db
    volumes:
      - ./database:/database
    networks:
      - florist

  nginx:
    image: nginx:alpine
    container_name: florist-shop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - florist

networks:
  florist:
    driver: bridge
